name: Pin Bump

on:
  repository_dispatch:
    types: [pin-bump]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Route and bump pin
        uses: fractalyze/github-actions/pin-bump@main
        if: github.event.client_payload.source_repo == 'zk_dtypes'
        with:
          upstream_repo: zk_dtypes
          upstream_commit: ${{ github.event.client_payload.commit }}
          pin_file: third_party/zk_dtypes/workspace.bzl
          var_prefix: ZK_DTYPES
          github_token: ${{ secrets.BUMPER_GH_PAT }}
          read_token: ${{ secrets.FRACTALYZE_REPOS_READ_TOKEN }}
