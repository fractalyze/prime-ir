name: Benchmark

permissions: read-all

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
      - ".gemini/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-cpu:
    runs-on: [self-hosted, zkx]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Build poseidon2_benchmark (CPU)
        run: |
          bazel --bazelrc=.bazelrc.ci build \
            --config=ci \
            -c opt \
            //zkx/tools/stablehlo_runner:poseidon2_benchmark

      - name: Run poseidon2_permute (CPU)
        uses: fractalyze/benchmark-action@v2
        with:
          benchmark_cmd: |
            ./bazel-bin/zkx/tools/stablehlo_runner/poseidon2_benchmark \
              zkx/tools/stablehlo_runner/poseidon2_permutation.stablehlo.mlir \
              --platform=cpu \
              --benchmark_repetitions=10 \
              --benchmark_min_time=0.5s \
              --zkbench_out=benchmark_results.json
          repo: zkx
          device: cpu
          results_file: benchmark_results.json
          regression_threshold: "0.10"
          rolling_window: "5"
          store_results: ${{ github.ref == 'refs/heads/main' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-poseidon2-cpu
          path: benchmark_results.json
          retention-days: 90

  benchmark-ntt-cpu:
    runs-on: [self-hosted, zkx]
    needs: benchmark-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Build ntt_benchmark (CPU)
        run: |
          bazel --bazelrc=.bazelrc.ci build \
            --config=ci \
            -c opt \
            //zkx/tools/stablehlo_runner:ntt_benchmark

      - name: Run ntt_forward (CPU)
        uses: fractalyze/benchmark-action@v2
        with:
          benchmark_cmd: |
            ./bazel-bin/zkx/tools/stablehlo_runner/ntt_benchmark \
              zkx/tools/stablehlo_runner/ntt.stablehlo.mlir \
              --platform=cpu \
              --benchmark_repetitions=10 \
              --benchmark_min_time=0.5s \
              --zkbench_out=benchmark_results.json
          repo: zkx
          device: cpu
          results_file: benchmark_results.json
          regression_threshold: "0.10"
          rolling_window: "5"
          store_results: ${{ github.ref == 'refs/heads/main' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-ntt-cpu
          path: benchmark_results.json
          retention-days: 90

  benchmark-gpu:
    runs-on: [self-hosted, zkx]
    needs: benchmark-ntt-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Build poseidon2_benchmark (GPU)
        run: |
          bazel --bazelrc=.bazelrc.ci build \
            --config=ci \
            --config=cuda_clang \
            -c opt \
            //zkx/tools/stablehlo_runner:poseidon2_benchmark

      - name: Run poseidon2_permute (GPU)
        uses: fractalyze/benchmark-action@v2
        with:
          benchmark_cmd: |
            ./bazel-bin/zkx/tools/stablehlo_runner/poseidon2_benchmark \
              zkx/tools/stablehlo_runner/poseidon2_permutation.stablehlo.mlir \
              --platform=gpu \
              --benchmark_repetitions=10 \
              --benchmark_min_time=0.5s \
              --zkbench_out=benchmark_results.json
          repo: zkx
          device: gpu
          results_file: benchmark_results.json
          regression_threshold: "0.10"
          rolling_window: "5"
          store_results: ${{ github.ref == 'refs/heads/main' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-poseidon2-gpu
          path: benchmark_results.json
          retention-days: 90

  benchmark-ntt-gpu:
    runs-on: [self-hosted, zkx]
    needs: benchmark-gpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Build ntt_benchmark (GPU)
        run: |
          bazel --bazelrc=.bazelrc.ci build \
            --config=ci \
            --config=cuda_clang \
            -c opt \
            //zkx/tools/stablehlo_runner:ntt_benchmark

      - name: Run ntt_forward (GPU)
        uses: fractalyze/benchmark-action@v2
        with:
          benchmark_cmd: |
            ./bazel-bin/zkx/tools/stablehlo_runner/ntt_benchmark \
              zkx/tools/stablehlo_runner/ntt.stablehlo.mlir \
              --platform=gpu \
              --benchmark_repetitions=10 \
              --benchmark_min_time=0.5s \
              --zkbench_out=benchmark_results.json
          repo: zkx
          device: gpu
          results_file: benchmark_results.json
          regression_threshold: "0.10"
          rolling_window: "5"
          store_results: ${{ github.ref == 'refs/heads/main' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-ntt-gpu
          path: benchmark_results.json
          retention-days: 90

  benchmark-sumcheck-gpu:
    runs-on: [self-hosted, zkx]
    needs: benchmark-ntt-gpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Build icicle_sumcheck_benchmark (GPU)
        run: |
          bazel --bazelrc=.bazelrc.ci build \
            --config=ci \
            --config=cuda_clang \
            -c opt \
            //zkx/tools/stablehlo_runner:icicle_sumcheck_benchmark

      - name: Run sumcheck_icicle (GPU)
        uses: fractalyze/benchmark-action@v2
        with:
          benchmark_cmd: |
            ./bazel-bin/zkx/tools/stablehlo_runner/icicle_sumcheck_benchmark \
              --platform=gpu \
              --benchmark_repetitions=10 \
              --benchmark_min_time=0.5s \
              --zkbench_out=benchmark_results.json
          repo: zkx
          device: gpu
          results_file: benchmark_results.json
          regression_threshold: "0.10"
          rolling_window: "5"
          store_results: ${{ github.ref == 'refs/heads/main' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-sumcheck-gpu
          path: benchmark_results.json
          retention-days: 90

  benchmark-msm-gpu:
    runs-on: [self-hosted, zkx]
    needs: benchmark-sumcheck-gpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Build msm_benchmark (GPU)
        run: |
          bazel --bazelrc=.bazelrc.ci build \
            --config=ci \
            --config=cuda_clang \
            -c opt \
            //zkx/tools/stablehlo_runner:msm_benchmark

      - uses: fractalyze/benchmark-action@main
        with:
          benchmark_cmd: |
            ./bazel-bin/zkx/tools/stablehlo_runner/msm_benchmark \
              zkx/tools/stablehlo_runner/msm_g1.stablehlo.mlir \
              --platform=gpu \
              --benchmark_repetitions=10 \
              --benchmark_min_time=0.5s \
              --zkbench_out=benchmark_results.json
          implementation: zkx-msm-gpu
          tags: "gpu"
          regression_threshold: "0.10"
          rolling_window: "5"
          results_dir: benchmark_data/gpu
          baseline_path: benchmark_data/gpu/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-zkx-msm-gpu
          path: benchmark_results.json
          retention-days: 90
