name: CI

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: [self-hosted, cpu]
    steps:
      # Full history so bazel-diff can check out and hash the PR base revision.
      - name: Checkout PrimeIR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PRs build and test only the targets bazel-diff reports as impacted by
      # the base..head change; pushes to main run the full suite.
      - name: Run `bazel test` (diff only)
        if: github.event_name == 'pull_request'
        run: |
          BAZEL_DIFF=$(mktemp -t bazel-diff.XXXXXX.jar)
          curl -Lo "$BAZEL_DIFF" https://github.com/Tinder/bazel-diff/releases/download/17.0.2/bazel-diff_deploy.jar
          ./build_tools/github_actions/ci_build_bazel.sh "$BAZEL_DIFF" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

      - name: Run `bazel test` (all)
        if: github.event_name != 'pull_request'
        run: ./build_tools/github_actions/ci_build_bazel.sh

      # Capture the runner-local test.log a failed test leaves behind — the CI
      # stream only carries the FAIL summary, not the gtest output.
      - name: Upload bazel test logs
        if: ${{ failure() }}
        uses: fractalyze/.github/.github/actions/upload-bazel-testlogs@main

  pre-commit-style:
    if: github.actor != 'fractalyze-dev'
    runs-on: [self-hosted, cpu]
    steps:
      - name: Checkout PrimeIR
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Fetch base commit for pre-commit diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1

      - name: Checkout Setup Python
        uses: actions/setup-python@v4.7.0
        with:
          python-version: "3.10"

      - name: Install cpplint
        run: pip install cpplint

      # FIXME(ashjeong): clang-tidy currently fails on CI. See https://github.com/fractalyze/prime-ir/actions/runs/16904324348/job/47890440254 for more details.
      # - name: Refresh compile commands
      #   run: |
      #     bazel run --remote_cache=grpc://127.0.0.1:9092 @hedron_compile_commands//:refresh_all

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --from-ref ${{ github.event.pull_request.base.sha || 'HEAD~1' }} --to-ref HEAD
