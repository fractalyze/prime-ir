name: PR Review

on:
  pull_request:
    types: [opened, closed]
  issue_comment:
    types: [created]

jobs:
  review:
    # Run on: PR opened OR /fractal review comment on PR
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'opened') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/fractal review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: fractalyze/github-actions/pr-reviewer@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          knowledge_repo_token: ${{ secrets.KNOWLEDGE_REPO_TOKEN }}
          claude_repo_token: ${{ secrets.CLAUDE_REPO_TOKEN }}

  collect-score:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: fractalyze/github-actions/pr-review-score-collector@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_repo_token: ${{ secrets.CLAUDE_REPO_TOKEN }}
