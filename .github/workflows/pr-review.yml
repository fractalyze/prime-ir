name: PR Review

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  review:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: fractalyze/github-actions/pr-reviewer@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          knowledge_repo_token: ${{ secrets.KNOWLEDGE_REPO_TOKEN }}
          claude_repo_token: ${{ secrets.CLAUDE_REPO_TOKEN }}

  collect-score:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: fractalyze/github-actions/pr-review-score-collector@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_repo_token: ${{ secrets.CLAUDE_REPO_TOKEN }}
